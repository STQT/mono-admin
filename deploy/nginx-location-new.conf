# nginx snippet для подмонтировать mona-admin под /new/ к существующему
# server-блоку https://aksiya.monoelectric.uz/.
#
# Вставить ВНУТРИ server { listen 443 ssl; server_name aksiya.monoelectric.uz; ... }
# до или после уже существующих location'ов (порядок не важен — путь /new/
# не пересекается с /api, /admin, /media, /static).
#
# Если nginx крутится в Docker внутри mona/ — править mona/nginx/nginx.conf,
# хост:контейнер маппинг mona-admin (5990:3000) пробрасывает наружу.

upstream mona_admin_upstream {
    server 127.0.0.1:5990;          # 5990 — порт хоста где живёт mona-admin
    keepalive 16;
}

# Внутри SSL-блока aksiya.monoelectric.uz:
location ^~ /new/_next/static/ {
    proxy_pass http://mona_admin_upstream;
    proxy_cache_bypass $http_upgrade;
    add_header Cache-Control "public, max-age=31536000, immutable";
}

location ^~ /new/ {
    proxy_pass http://mona_admin_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;

    # noindex для админ-зоны
    add_header X-Robots-Tag "noindex, nofollow" always;
}

# ВАЖНО: оставьте корневой location /  для существующего Django backend
# нетронутым — Django admin продолжит работать на корне домена, /api/ и
# /media/ тоже. mona-admin сидит только под /new/.
